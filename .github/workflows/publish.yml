name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (e.g. latest, beta)"
        required: false
        default: "latest"
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run lint:strict

      - run: npm run typecheck

      - run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance --tag ${{ inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish dry run
        if: ${{ inputs.dry-run }}
        run: npm publish --dry-run --tag ${{ inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
